<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dika Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d1117;
color:white;
}

header{
background:linear-gradient(90deg,#0066ff,#000000);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:30px auto;
background:#161b22;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,102,255,0.3);
}

.banner{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#4da3ff;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#21262d;
color:white;
font-size:15px;
}

.payment{
margin-top:20px;
background:#21262d;
padding:15px;
border-radius:10px;
}

.payment h3{
margin-bottom:10px;
color:#4da3ff;
}

.btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#0066ff;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#0052cc;
}

/* WHEEL */

.wheel-box{
margin-top:20px;
background:#21262d;
padding:20px;
border-radius:15px;
text-align:center;
}

.wheel-container{
position:relative;
width:250px;
height:250px;
margin:20px auto;
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid white;
transition:transform 5s ease-out;

background:
conic-gradient(
#1e90ff 0deg 51deg,
#0d6efd 51deg 102deg,
#0047ab 102deg 153deg,
#0066ff 153deg 204deg,
#3399ff 204deg 255deg,
#003366 255deg 306deg,
#4da3ff 306deg 360deg
);

}

.pointer{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-top:30px solid red;

position:absolute;
top:-5px;
left:50%;
transform:translateX(-50%);
}

.spin-btn{
padding:12px 25px;
border:none;
border-radius:10px;
background:#0066ff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.spin-btn:disabled{
background:gray;
cursor:not-allowed;
}

#hasilDiskon{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#4da3ff;
}

footer{
text-align:center;
padding:20px;
color:#999;
font-size:14px;
}

</style>
</head>

<body>

<header>
Dika Store
</header>

<div class="container">

<img
class="banner"
src="https://wallpapercave.com/wp/wp5128415.jpg"
>

<h2>Top Up Free Fire</h2>

<label>ID Free Fire</label>

<input
type="text"
id="idff"
placeholder="Masukkan ID Free Fire"
>

<!-- WHEEL -->

<div class="wheel-box">

<h3>Spin Diskon</h3>

<p>
Spin hanya bisa dilakukan 1x
</p>

<div class="wheel-container">

<div class="pointer"></div>

<div class="wheel" id="wheel"></div>

</div>

<button
class="spin-btn"
id="spinBtn"
onclick="spinWheel()"
>
SPIN SEKARANG
</button>

<div id="hasilDiskon">
Belum mendapatkan diskon
</div>

</div>

<label>Pilih Diamond</label>

<select id="diamond">

<option value="">
-- Pilih Diamond --
</option>

<option>
70 Diamond - Rp10.000
</option>

<option>
140 Diamond - Rp20.000
</option>

<option>
355 Diamond - Rp50.000
</option>

<option>
720 Diamond - Rp100.000
</option>

</select>

<label>Metode Pembayaran</label>

<select id="payment">

<option value="">
-- Pilih Pembayaran --
</option>

<option>
DANA
</option>

</select>

<div class="payment">

<h3>Pembayaran DANA</h3>

<p>Transfer ke:</p>

<b>083142324267</b>

</div>

<button
class="btn"
onclick="kirimPesanan()"
>
Beli Sekarang
</button>

</div>

<footer>
© 2026 Dika Store
</footer>

<script>

let diskonDidapat = "0%";

/* CEK SUDAH SPIN */

window.onload = function(){

if(localStorage.getItem("sudahSpin") === "iya"){

document.getElementById("spinBtn").disabled = true;

document.getElementById("hasilDiskon").innerHTML =
"Spin diskon sudah digunakan";

}

}

/* SPIN */

function spinWheel(){

let idFF =
document.getElementById("idff").value;

if(idFF === ""){
alert("Masukkan ID Free Fire terlebih dahulu!");
return;
}

if(localStorage.getItem("sudahSpin") === "iya"){
alert("Kamu sudah menggunakan spin!");
return;
}

localStorage.setItem("sudahSpin","iya");

document.getElementById("spinBtn").disabled = true;

const hadiah = [
"0%",
"0%",
"0%",
"0%",
"2%",
"2%",
"2%",
"10%",
"30%",
"50%",
"70%",
"99%"
];

diskonDidapat =
hadiah[Math.floor(Math.random()*hadiah.length)];

let wheel =
document.getElementById("wheel");

let randomDeg =
3600 + Math.floor(Math.random()*360);

wheel.style.transform =
"rotate(" + randomDeg + "deg)";

setTimeout(() => {

document.getElementById("hasilDiskon").innerHTML =
"🎉🎊 SELAMAT 🎊🎉<br>Kamu mendapatkan diskon " +
diskonDidapat;

},5000);

}

/* KIRIM TELEGRAM */

async function kirimPesanan(){

let id =
document.getElementById("idff").value;

let diamond =
document.getElementById("diamond").value;

let pembayaran =
document.getElementById("payment").value;

if(id === "" || diamond === "" || pembayaran === ""){
alert("Lengkapi data terlebih dahulu!");
return;
}

let pesan =
`🔥 PESANAN BARU DIKA STORE 🔥

ID FF : ${id}

Diamond : ${diamond}

Pembayaran : ${pembayaran}

Diskon : ${diskonDidapat}`;

let token =
"8598368934:AAEZSHWjH0yrTFGYKCzxYCcJwUdZCQzCWS4";

let chatid =
"8919873951";

let url =
`https://api.telegram.org/bot${token}/sendMessage`;

await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chatid,
text:pesan
})
});

alert("Pesanan berhasil dikirim!");

}

</script>

</body>
</html>
